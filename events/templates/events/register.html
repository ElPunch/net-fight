{% extends 'events/base.html' %}
{% block title %}Fight.net – Registro{% endblock %}

{% block content %}
<style>
  .auth-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 100px);
  }
  .auth-box {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-top: 3px solid var(--red);
    border-radius: 8px;
    padding: 2.5rem 2rem;
  }
  .auth-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    text-align: center;
    margin-bottom: 1.8rem;
    letter-spacing: 2px;
  }
  .auth-title span { color: var(--red); }
  .auth-footer {
    text-align: center;
    margin-top: 1.2rem;
    font-size: .85rem;
    color: var(--muted);
  }
  .auth-footer a { color: var(--red); text-decoration: none; font-weight: 600; }
  .rol-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .5rem;
  }
  .rol-opt {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: .7rem;
    cursor: pointer;
    text-align: center;
    font-size: .85rem;
    transition: all .2s;
    color: var(--muted);
  }
  .rol-opt:hover, .rol-opt.selected {
    border-color: var(--red);
    color: var(--white);
    background: rgba(232,25,44,.1);
  }
  .rol-opt strong { display: block; font-size: 1rem; }
</style>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-title">Crear cuenta</div>

    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="username" placeholder="tu_usuario">
    </div>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="email" placeholder="correo@ejemplo.com">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="mínimo 8 caracteres">
    </div>

    <div class="form-group">
      <label>Tipo de cuenta</label>
      <div class="rol-grid">
        <div class="rol-opt selected" data-rol="fighter">
          <strong>🥊 Peleador</strong>
          Asiste a eventos
        </div>
        <div class="rol-opt" data-rol="promoter">
          <strong>📋 Promotor</strong>
          Crea eventos
        </div>
      </div>
    </div>

    <button class="btn btn-primary" style="width:100%;margin-top:.5rem" id="btn-register">
      Crear cuenta
    </button>

    <div class="auth-footer">
      ¿Ya tienes cuenta? <a href="/login/">Inicia sesión</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  let rolSelected = 'fighter';

  // Selección de rol
  document.querySelectorAll('.rol-opt').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.rol-opt').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      rolSelected = el.dataset.rol;
    });
  });

  document.getElementById('btn-register').addEventListener('click', async () => {
    const username = document.getElementById('username').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !email || !password) {
      showToast('Completa todos los campos');
      return;
    }
    if (password.length < 8) {
      showToast('La contraseña debe tener al menos 8 caracteres');
      return;
    }

    const res = await apiFetch('/register/', 'POST', { username, email, password, rol: rolSelected });
    if (res.ok) {
      window.location.href = res.redirect || '/';
    } else {
      showToast(res.error || 'Error al registrar');
    }
  });
</script>
{% endblock %}
