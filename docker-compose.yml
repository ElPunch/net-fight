version: "3.9"

# ─────────────────────────────────────────────────────────────
#  Fight.net - Orquestacion con Docker Compose
#  Servicios:
#    - db       : Base de datos PostgreSQL
#    - backend  : Django + DRF (API JSON + templates) via Gunicorn
#    - frontend : Nginx como servidor del frontend (sirve /static y
#                 /media directamente y hace proxy al backend).
# ─────────────────────────────────────────────────────────────

services:

  db:
    image: postgres:15-alpine
    container_name: fightnet_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-fightnet_db}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mfdoom}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: .
    container_name: fightnet_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY:       ${DJANGO_SECRET_KEY:-django-insecure-fightnet-dev}
      DJANGO_DEBUG:            ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS:    ${DJANGO_ALLOWED_HOSTS:-*}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      POSTGRES_DB:       ${POSTGRES_DB:-fightnet_db}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mfdoom}
      POSTGRES_HOST:     db
      POSTGRES_PORT:     5432
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    ports:
      - "8000:8000"

  frontend:
    image: nginx:1.27-alpine
    container_name: fightnet_frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/usr/share/nginx/static:ro
      - media_volume:/usr/share/nginx/media:ro
    ports:
      - "80:80"

volumes:
  postgres_data:
  static_volume:
  media_volume:
