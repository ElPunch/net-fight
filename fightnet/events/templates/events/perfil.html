{% extends 'events/base.html' %}
{% block title %}Fight.net – Mi Perfil{% endblock %}

{% block content %}
<style>
  .perfil-wrapper {
    max-width: 560px;
    margin: 0 auto;
  }
  .perfil-header {
    margin-bottom: 2rem;
  }
  .perfil-header h1 { font-size: 2rem; }
  .perfil-header p  { color: var(--muted); font-size: .9rem; margin-top: .3rem; }

  .avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--red-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--white);
    margin-bottom: 1.2rem;
    border: 2px solid var(--red);
  }

  .info-readonly {
    background: #0f1115;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: .55rem .9rem;
    font-size: .95rem;
    color: var(--muted);
    width: 100%;
  }

  .section-divider {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin: 1.5rem 0 1rem;
    padding-bottom: .4rem;
    border-bottom: 1px solid var(--border);
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    color: var(--muted);
    text-decoration: none;
    font-size: .85rem;
    font-weight: 600;
    letter-spacing: .5px;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    transition: color .2s;
  }
  .back-link:hover { color: var(--white); }
</style>

<div class="perfil-wrapper">
  <a href="/peleador/" class="back-link">← Volver a eventos</a>

  <div id="loading"><div class="spinner"></div></div>

  <div id="perfil-content" style="display:none">
    <div class="avatar" id="avatar-inicial">?</div>

    <div class="perfil-header">
      <h1>Mi Perfil</h1>
      <p>Actualiza tu informacion personal</p>
    </div>

    <div class="section-divider">Informacion de cuenta</div>
    <div class="form-group">
      <label>Usuario</label>
      <div class="info-readonly" id="info-username">—</div>
    </div>
    <div class="form-group">
      <label>Rol</label>
      <div class="info-readonly">Peleador</div>
    </div>

    <div class="section-divider">Datos editables</div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="input-email" placeholder="tu@email.com">
    </div>
    <div class="form-group">
      <label>Bio</label>
      <textarea id="input-bio" rows="4" placeholder="Cuentanos sobre ti: peso, categoria, estilo de pelea..."></textarea>
    </div>

    <div style="display:flex;justify-content:flex-end;margin-top:1.2rem">
      <button class="btn btn-primary" id="btn-guardar">Guardar cambios</button>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
  async function loadPerfil() {
    const res = await apiFetch('/api/me/');

    document.getElementById('info-username').textContent = res.username;
    document.getElementById('input-email').value         = res.email || '';
    document.getElementById('input-bio').value           = res.bio   || '';
    document.getElementById('avatar-inicial').textContent =
      res.username.charAt(0).toUpperCase();

    document.getElementById('loading').style.display        = 'none';
    document.getElementById('perfil-content').style.display = 'block';
  }

  document.getElementById('btn-guardar').addEventListener('click', async () => {
    const email = document.getElementById('input-email').value.trim();
    const bio   = document.getElementById('input-bio').value.trim();
    const btn   = document.getElementById('btn-guardar');

    btn.disabled    = true;
    btn.textContent = 'Guardando...';

    const res = await apiFetch('/api/me/', 'POST', { email, bio });

    if (res.ok) {
      showToast('Perfil actualizado correctamente', 'success');
    } else {
      showToast(res.error || 'Error al guardar');
    }

    btn.disabled    = false;
    btn.textContent = 'Guardar cambios';
  });

  loadPerfil();
</script>
{% endblock %}
